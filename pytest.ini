[pytest]
# A suíte do projeto vive em tests/.
#
# norecursedirs: worktrees git criadas DENTRO da raiz (wt-*/ e .claude/worktrees/)
# carregam uma cópia inteira de tests/. Sem esta linha, o pytest coleta os dois
# conjuntos, colide nos basenames ("import file mismatch") e a suíte nem chega a
# rodar — `python3 -m pytest -q` (o comando do CLAUDE.md) falha com ~162 erros de
# coleta enquanto existir uma worktree aqui.
#
# A lista repete os defaults do pytest (.* build dist CVS _darcs {arch} *.egg
# venv node_modules) porque definir norecursedirs SUBSTITUI o default, não soma.
norecursedirs = .* build dist CVS _darcs {arch} *.egg venv node_modules wt-*
